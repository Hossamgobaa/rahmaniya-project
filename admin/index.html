<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة — دليل الرحمانية</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0B2A4A">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../assets/css/style.css">

<!-- Leaflet (لتحديد الموقع على الخريطة) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- Firebase (App + Firestore + Authentication) -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="brandmark"><i class="fa-solid fa-user-shield"></i></div>
    <h2>لوحة إدارة دليل الرحمانية</h2>
    <p>تسجيل دخول مخصص للمدير فقط</p>
    <form id="adminLoginForm">
      <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="adminEmailInput" placeholder="admin@example.com" required></div>
      <div class="form-group"><label>كلمة المرور</label><input type="password" id="adminPasswordInput" placeholder="••••••••" required></div>
      <div id="adminLoginError" style="color:var(--danger);font-size:12px;font-weight:700;margin-bottom:8px;display:none;"></div>
      <button type="submit" class="btn-submit"><i class="fa-solid fa-right-to-bracket"></i> دخول</button>
    </form>
    <a href="../index.html" class="back-to-site" style="display:block;margin-top:16px;"><i class="fa-solid fa-arrow-right"></i> الرجوع للموقع</a>
  </div>
</div>

<!-- لوحة الإدارة (تظهر فقط بعد تسجيل الدخول) -->
<div id="adminApp" style="display:none;">
  <header class="admin-header">
    <div class="logo-row">
      <div class="logo-mark"><i class="fa-solid fa-location-dot"></i></div>
      <span class="logo-text">لوحة إدارة الرحمانية</span>
    </div>
    <div class="row" style="gap:12px;">
      <a href="../index.html" class="back-to-site"><i class="fa-solid fa-arrow-up-right-from-square"></i> الموقع</a>
      <button class="exit-btn" id="adminLogoutBtn"><i class="fa-solid fa-right-from-bracket"></i> خروج</button>
    </div>
  </header>
  <main id="app"></main>
</div>

<div id="toast"></div>

<script src="../firebase/firebase-config.js"></script>
<script src="../assets/js/common.js"></script>
<script src="admin.js"></script>
</body>
</html>
